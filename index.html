<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CIPD Level 5 Study Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #3e2723;
      background: #fdf6f9;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -webkit-touch-callout: none;
    }

    body {
      padding-top: max(0px, env(safe-area-inset-top));
      padding-left: max(0px, env(safe-area-inset-left));
      padding-right: max(0px, env(safe-area-inset-right));
      padding-bottom: max(0px, env(safe-area-inset-bottom));
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      background: #fdf6f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header with gradient & floral accent */
    .hdr {
      background: linear-gradient(135deg, #f48fb1 0%, #ce93d8 50%, #a5d6a7 100%);
      padding: max(24px, calc(24px + env(safe-area-inset-top))) 24px 24px 24px;
      text-align: center;
      position: relative;
      box-shadow: 0 4px 12px rgba(194, 24, 91, 0.15);
      overflow: hidden;
    }

    .hdr::before {
      content: '🌸 🌺 🌷 🌸 🌺';
      position: absolute;
      top: 8px;
      left: 0;
      right: 0;
      font-size: 20px;
      opacity: 0.6;
      letter-spacing: 12px;
    }

    .hdr h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .hdr p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      position: relative;
      z-index: 1;
    }

    /* Navigation pills - horizontal scrollable */
    .nav {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 16px 16px;
      background: #fdf6f9;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .nav::-webkit-scrollbar {
      display: none;
    }

    .nav-item {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(194, 24, 91, 0.1);
      color: #5d4037;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-item:hover {
      background: #f8e8ee;
      border-color: rgba(194, 24, 91, 0.2);
    }

    .nav-item.active {
      background: #c2185b;
      color: #ffffff;
      border-color: #c2185b;
    }

    /* Main feed container */
    .feed {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Content card blocks (like Reddit posts) */
    .block {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(194, 24, 91, 0.08);
      transition: all 0.3s ease;
      border: 1px solid rgba(194, 24, 91, 0.05);
    }

    .block:hover {
      box-shadow: 0 4px 16px rgba(194, 24, 91, 0.12);
    }

    .block-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .block-title {
      font-size: 16px;
      font-weight: 600;
      color: #3e2723;
      flex: 1;
    }

    .chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #e8def8;
      color: #6a1b9a;
      white-space: nowrap;
    }

    .chip.module {
      background: #c2e1ff;
      color: #0d47a1;
    }

    .chip.level {
      background: #fff3e0;
      color: #e65100;
    }

    /* Module grid */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .module-card {
      background: linear-gradient(135deg, #f8e8ee 0%, #e8def8 100%);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(194, 24, 91, 0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .module-card::before {
      content: '🌸';
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 24px;
      opacity: 0.3;
    }

    .module-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(194, 24, 91, 0.15);
    }

    .module-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #3e2723;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .module-card p {
      font-size: 12px;
      color: #5d4037;
    }

    /* Buttons */
    .btn-primary,
    .btn-secondary,
    .btn-accent {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: #c2185b;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #a01646;
      box-shadow: 0 4px 12px rgba(194, 24, 91, 0.3);
    }

    .btn-secondary {
      background: #f8e8ee;
      color: #c2185b;
      border: 1px solid #c2185b;
    }

    .btn-secondary:hover {
      background: #f48fb1;
      color: #ffffff;
    }

    .btn-accent {
      background: #66bb6a;
      color: #ffffff;
    }

    .btn-accent:hover {
      background: #4caf50;
      box-shadow: 0 4px 12px rgba(102, 187, 106, 0.3);
    }

    /* Quiz options */
    .quiz-option {
      background: #ffffff;
      border: 2px solid #e8def8;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      color: #3e2723;
    }

    .quiz-option:hover {
      border-color: #c2185b;
      background: #f8e8ee;
    }

    .quiz-option.selected {
      border-color: #c2185b;
      background: #fce4ec;
    }

    .quiz-option.correct {
      border-color: #66bb6a;
      background: #c8e6c9;
      color: #2e7d32;
    }

    .quiz-option.wrong {
      border-color: #e53935;
      background: #ffcdd2;
      color: #c62828;
    }

    /* True/False buttons */
    .tf-row {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }

    .tf-btn {
      flex: 1;
      padding: 16px 12px;
      border-radius: 12px;
      border: 2px solid #e8def8;
      background: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tf-btn:hover {
      border-color: #c2185b;
    }

    .tf-btn.selected {
      border-color: #c2185b;
      background: #fce4ec;
      color: #c2185b;
    }

    /* Scenario box */
    .scenario-box {
      background: linear-gradient(135deg, #e8def8 0%, #d0bcff 100%);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 4px solid #9c27b0;
      font-size: 14px;
      color: #3e2723;
      line-height: 1.7;
    }

    /* Decision buttons */
    .decision-btn {
      width: 100%;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid rgba(194, 24, 91, 0.1);
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #3e2723;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .decision-btn:hover {
      background: #f8e8ee;
      border-color: #c2185b;
      box-shadow: 0 2px 8px rgba(194, 24, 91, 0.1);
    }

    /* Result circle */
    .result-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      margin: 0 auto 16px;
      color: #ffffff;
    }

    .result-circle.success {
      background: linear-gradient(135deg, #66bb6a, #81c784);
    }

    .result-circle.warning {
      background: linear-gradient(135deg, #fbc02d, #fdd835);
      color: #3e2723;
    }

    .result-circle.error {
      background: linear-gradient(135deg, #e53935, #ef5350);
    }

    /* Stats display */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .stat-box {
      background: #fce4ec;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-box .label {
      font-size: 12px;
      color: #5d4037;
      margin-bottom: 4px;
    }

    .stat-box .value {
      font-size: 24px;
      font-weight: 700;
      color: #c2185b;
    }

    /* Achievement grid */
    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .achievement-card {
      background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .achievement-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 187, 106, 0.2);
    }

    .achievement-card.locked {
      background: #e0e0e0;
      color: #9e9e9e;
      opacity: 0.6;
    }

    .achievement-card-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .achievement-card-name {
      font-size: 12px;
      font-weight: 600;
      color: #2e7d32;
    }

    .achievement-card.locked .achievement-card-name {
      color: #757575;
    }

    /* Progress bars */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c2185b, #e91e90);
      transition: width 0.4s ease;
      border-radius: 4px;
    }

    /* Streak banner */
    .streak-banner {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border-left: 4px solid #f57c00;
      margin: 16px 0;
    }

    .streak-banner .streak-count {
      font-size: 32px;
      font-weight: 700;
      color: #e65100;
    }

    .streak-banner .streak-label {
      font-size: 12px;
      color: #5d4037;
      margin-top: 4px;
    }

    /* Explanation box */
    .explanation {
      background: #e8f5e9;
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #66bb6a;
      margin: 16px 0;
      font-size: 14px;
      color: #2e7d32;
      line-height: 1.7;
    }

    /* Collapsible study sections */
    .study-section {
      margin-bottom: 12px;
    }

    .study-toggle {
      width: 100%;
      padding: 14px 16px;
      background: #f8e8ee;
      border-radius: 12px;
      border: 1px solid rgba(194, 24, 91, 0.1);
      font-size: 14px;
      font-weight: 600;
      color: #3e2723;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .study-toggle:hover {
      background: #f48fb1;
      color: #ffffff;
    }

    .study-toggle::after {
      content: '▼';
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    .study-toggle.open::after {
      transform: rotate(180deg);
    }

    .study-body {
      padding: 16px;
      background: #ffffff;
      border-radius: 0 0 12px 12px;
      border: 1px solid rgba(194, 24, 91, 0.1);
      border-top: none;
      font-size: 14px;
      color: #3e2723;
      line-height: 1.7;
      display: none;
    }

    .study-body.open {
      display: block;
    }

    /* Crisis mode timer */
    .crisis-timer {
      width: 100%;
      height: 4px;
      background: #ffebee;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .crisis-timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #e53935, #d32f2f);
      transition: width 0.1s linear;
    }

    /* Board game area */
    .board-container {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
      border: 2px solid rgba(194, 24, 91, 0.1);
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .board-tile {
      aspect-ratio: 1;
      border-radius: 12px;
      background: linear-gradient(135deg, #e8def8, #d0bcff);
      border: 2px solid rgba(194, 24, 91, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      color: #6a1b9a;
    }

    .board-tile:hover {
      transform: scale(1.05);
      border-color: #c2185b;
    }

    .board-tile.current {
      background: linear-gradient(135deg, #c2185b, #e91e90);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(194, 24, 91, 0.2);
    }

    .board-tile.completed {
      background: #c8e6c9;
      color: #2e7d32;
      border-color: #66bb6a;
    }

    /* Dice button */
    .dice-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c2185b, #e91e90);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(194, 24, 91, 0.3);
    }

    .dice-btn:active {
      transform: translateY(0);
    }

    /* War room / case study panel */
    .war-room-panel {
      background: linear-gradient(135deg, #fce4ec 0%, #f8e8ee 100%);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(194, 24, 91, 0.2);
    }

    .war-room-panel h3 {
      font-size: 16px;
      font-weight: 600;
      color: #c2185b;
      margin-bottom: 12px;
    }

    /* Multi-dimensional score display */
    .score-dimension {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid rgba(194, 24, 91, 0.1);
    }

    .score-dimension-label {
      font-size: 13px;
      font-weight: 500;
      color: #5d4037;
    }

    .score-dimension-value {
      font-size: 14px;
      font-weight: 700;
      color: #c2185b;
    }

    /* Decorative floral accent */
    .floral-accent {
      font-size: 24px;
      opacity: 0.3;
      display: inline-block;
      margin: 0 4px;
    }

    /* Fade in animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    /* Mobile responsive adjustments */
    @media (max-width: 430px) {
      .hdr {
        padding-top: max(16px, calc(16px + env(safe-area-inset-top)));
        padding-left: 16px;
        padding-right: 16px;
      }

      .hdr h1 {
        font-size: 24px;
      }

      .feed {
        padding: 12px;
      }

      .block {
        padding: 14px;
        margin-bottom: 12px;
      }

      .nav {
        padding: 12px 12px;
        gap: 8px;
      }

      .module-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .achievement-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 375px) {
      .hdr h1 {
        font-size: 22px;
      }

      .hdr p {
        font-size: 12px;
      }

      .block-title {
        font-size: 15px;
      }

      .nav-item {
        padding: 8px 14px;
        font-size: 12px;
      }

      .btn-primary,
      .btn-secondary,
      .btn-accent {
        padding: 10px 20px;
        font-size: 13px;
      }

      .module-grid {
        grid-template-columns: 1fr;
      }

      .achievement-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

const shuffle = (arr) => {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};

// Quiz view
const Quiz = ({ currentModule, setCurrentModule, qIndex, setQIndex, selected, setSelected, answered, setAnswered, results, setResults, questions, setQuestions, stats, setStats }) => {
  const modules = [
    { code: '5CO01', name: 'Organizational Strategy & Culture' },
    { code: '5CO02', name: 'Talent Management & Learning' },
    { code: '5CO03', name: 'Reward & Wellbeing' },
    { code: '5HR01', name: 'Employee Relations' },
    { code: '5HR02', name: 'Workforce Planning' },
    { code: '5HR03', name: 'Compliance & Reward' }
  ];

  const startQuiz = (moduleCode) => {
    const moduleQuestions = MODULES[moduleCode]?.questions || [];
    const shuffled = shuffle(moduleQuestions);
    setCurrentModule(moduleCode);
    setQuestions(shuffled);
    setQIndex(0);
    setSelected(null);
    setAnswered(false);
    setResults([]);
  };

  if (results.length > 0) {
    const correct = results.filter(r => r.isCorrect).length;
    const percentage = Math.round((correct / results.length) * 100);
    let circleClass = 'success';
    if (percentage < 50) circleClass = 'error';
    else if (percentage < 75) circleClass = 'warning';

    return (
      <div className="feed">
        <div className="block">
          <h2 style={{ textAlign: 'center', marginBottom: '12px' }}>Quiz Complete! 🌸</h2>
          <div className={`result-circle ${circleClass}`}>{percentage}%</div>
          <p style={{ textAlign: 'center', marginBottom: '16px', color: '#5d4037' }}>
            You answered <strong>{correct} of {results.length}</strong> questions correctly.
          </p>
          <div className="stats-grid">
            <div className="stat-box">
              <div className="label">Correct</div>
              <div className="value">{correct}</div>
            </div>
            <div className="stat-box">
              <div className="label">Incorrect</div>
              <div className="value">{results.length - correct}</div>
            </div>
          </div>
          <button
            className="btn-primary"
            onClick={() => {
              setCurrentModule(null);
              setResults([]);
              setQIndex(0);
              setStats(prev => ({
                ...prev,
                tq: (prev.tq || 0) + 1,
                qs: Math.max(prev.qs || 0, percentage)
              }));
            }}
            style={{ width: '100%', marginTop: '16px' }}
          >
            Back to Quiz Selection
          </button>
        </div>

        <div style={{ marginTop: '16px' }}>
          <h3 style={{ marginBottom: '12px', color: '#c2185b' }}>Review Answers 📖</h3>
          {results.map((result, idx) => (
            <div key={idx} className="block">
              <p style={{ marginBottom: '8px', fontWeight: 600 }}>Q{idx + 1}: {result.question}</p>
              <p style={{
                color: result.isCorrect ? '#2e7d32' : '#c62828',
                marginBottom: '8px',
                fontWeight: 500
              }}>
                {result.isCorrect ? '✓ Correct' : '✗ Incorrect'}
              </p>
              <div className="explanation">
                <strong>Explanation:</strong> {result.explanation}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (!currentModule) {
    return (
      <div className="feed">
        <div className="block">
          <h3 className="block-title">Select a Module to Quiz ❓</h3>
          <div className="module-grid">
            {modules.map(m => (
              <div
                key={m.code}
                className="module-card"
                onClick={() => startQuiz(m.code)}
                style={{ cursor: 'pointer' }}
              >
                <h3>{m.code}</h3>
                <p style={{ fontSize: '12px' }}>{m.name}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const question = questions[qIndex];
  if (!question) return <div className="feed"><div className="block">Loading...</div></div>;

  const handleAnswer = (optionIdx) => {
    setSelected(optionIdx);
    setAnswered(true);

    const isTrueOrFalse = 'tf' in question;
    const isCorrect = isTrueOrFalse
      ? optionIdx === (question.tf ? 1 : 0)
      : optionIdx === question.ans;

    setResults(prev => [...prev, {
      question: question.q,
      isCorrect,
      explanation: question.exp
    }]);

    setTimeout(() => {
      if (qIndex < questions.length - 1) {
        setQIndex(qIndex + 1);
        setSelected(null);
        setAnswered(false);
      } else {
        // Quiz finished
      }
    }, 2000);

  const currentModuleObj = modules.find(m => m.code === currentModule);

      <div className="block">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
          <h3 className="block-title">{currentModuleObj?.name}</h3>
          <button className="btn-secondary" onClick={() => {
            setCurrentModule(null);
            setQuestions([]);
            setQIndex(0);
          }}>× Close</button>
        </div>
        <div style={{
          display: 'flex',
          gap: '4px',
          flexWrap: 'wrap',
          marginBottom: '16px'
        }}>
          {questions.map((_, idx) => (
            <div
              key={idx}
              style={{
                width: '24px',
                height: '24px',
                borderRadius: '50%',
                background: idx < results.length
                  ? results[idx].isCorrect ? '#66bb6a' : '#e53935'
                  : idx === qIndex ? '#c2185b' : '#e8e8e8',
                color: '#fff',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '11px',
                fontWeight: 600
              }}
            >
              {idx + 1}
            </div>
          ))}
        </div>
      </div>

      <div className="block">
        <h3 style={{ marginBottom: '16px', color: '#3e2723' }}>Question {qIndex + 1} of {questions.length}</h3>
        <p style={{ marginBottom: '16px', fontSize: '15px', fontWeight: 500 }}>{question.q}</p>

        {isTrueOrFalse ? (
          <div className="tf-row">
            {['True', 'False'].map((label, idx) => (
              <button
                key={idx}
                className={`tf-btn ${selected === idx ? 'selected' : ''}`}
                onClick={() => !answered && handleAnswer(idx)}
                disabled={answered}
                style={{ opacity: answered ? 0.7 : 1 }}
              >
                {label}
              </button>
            ))}
          </div>
        ) : (
          <div>
            {question.opts.map((opt, idx) => (
              <div
                key={idx}
                className={`quiz-option ${selected === idx ? 'selected' : ''} ${answered ? (idx === question.ans ? 'correct' : idx === selected ? 'wrong' : '') : ''}`}
                onClick={() => !answered && handleAnswer(idx)}
                style={{ cursor: answered ? 'default' : 'pointer' }}
              >
                {opt}
              </div>
            ))}
          </div>
        )}

        {answered && (
          <div className="explanation" style={{ marginTop: '16px' }}>
            <strong>Explanation:</strong> {question.exp}
          </div>
        )}
      </div>
    </div>
  );
};

// Crisis Simulator
const Crisis = ({ stats, setStats }) => {
  const [currentCrisis, setCurrentCrisis] = React.useState(null);
  const [crisisStage, setCrisisStage] = React.useState(0);
  const [crisisTimer, setCrisisTimer] = React.useState(20);
  const [crisisRunning, setCrisisRunning] = React.useState(false);
  const [crisisScore, setCrisisScore] = React.useState(0);
  const [crisisChoices, setCrisisChoices] = React.useState([]);

  React.useEffect(() => {
    if (!crisisRunning || crisisTimer <= 0) {
      setCrisisRunning(false);
      return;
    }
    const timer = setInterval(() => {
      setCrisisTimer(prev => {
        if (prev <= 1) {
          setCrisisRunning(false);
          // Auto-select worst choice
          const stage = CRISES[currentCrisis]?.stages[crisisStage];
          if (stage) {
            const worstChoice = stage.options.reduce((min, opt) => opt.impact < min.impact ? opt : min);
            handleCrisisChoice(stage.options.indexOf(worstChoice));
          }
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [crisisRunning, crisisTimer, currentCrisis, crisisStage]);

  const startCrisis = (crisisId) => {
    setCurrentCrisis(crisisId);
    setCrisisStage(0);
    setCrisisTimer(20);
    setCrisisRunning(true);
    setCrisisScore(0);
    setCrisisChoices([]);
  };

  const handleCrisisChoice = (choiceIdx) => {
    const crisis = CRISES[currentCrisis];
    const stage = crisis.stages[crisisStage];
    const choice = stage.options[choiceIdx];

    setCrisisScore(prev => prev + choice.impact);
    setCrisisChoices(prev => [...prev, { stage: crisisStage, text: choice.text, impact: choice.impact }]);
    setCrisisRunning(false);

    if (crisisStage < crisis.stages.length - 1) {
      setTimeout(() => {
        setCrisisStage(crisisStage + 1);
        setCrisisTimer(20);
        setCrisisRunning(true);
      }, 2000);
    }
  };

  if (!currentCrisis) {
    return (
      <div className="feed">
        <div className="block">
          <h3 className="block-title">Select a Crisis to Navigate 🔥</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', marginTop: '12px' }}>
            {Object.entries(CRISES).map(([id, crisis]) => (
              <button
                key={id}
                className="module-card"
                onClick={() => startCrisis(id)}
                style={{ cursor: 'pointer', background: '#fff3e0', border: '1px solid #ffc107' }}
              >
                <div style={{ fontSize: '28px' }}>⚠️</div>
                <h3 style={{ fontSize: '13px' }}>{crisis.title}</h3>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const crisis = CRISES[currentCrisis];
  if (!crisis) return <div className="feed"><div className="block">Loading...</div></div>;

  if (crisisStage >= crisis.stages.length) {
    return (
      <div className="feed">
        <div className="block">
          <h2 style={{ textAlign: 'center' }}>Crisis Resolution Report 📋</h2>
          <div className={`result-circle ${crisisScore > 60 ? 'success' : crisisScore > 40 ? 'warning' : 'error'}`}>
            {crisisScore}
          </div>
          <p style={{ textAlign: 'center', marginBottom: '16px', color: '#5d4037' }}>
            Final Impact Score: <strong>{crisisScore} points</strong>
          </p>

          <h3 style={{ marginBottom: '12px', color: '#c2185b' }}>Your Decisions:</h3>
          {crisisChoices.map((choice, idx) => (
            <div key={idx} style={{
              background: choice.impact > 50 ? '#c8e6c9' : '#ffcccc',
              padding: '12px',
              borderRadius: '8px',
              marginBottom: '8px',
              borderLeft: `4px solid ${choice.impact > 50 ? '#66bb6a' : '#e53935'}`
            }}>
              <strong>Stage {choice.stage + 1}:</strong> {choice.text}
              <div style={{ fontSize: '12px', color: '#5d4037', marginTop: '4px' }}>Impact: +{choice.impact} pts</div>
            </div>
          ))}

          <button
            className="btn-primary"
            onClick={() => {
              setCurrentCrisis(null);
              setCrisisStage(0);
              setCrisisChoices([]);
              setStats(prev => ({ ...prev, tc: (prev.tc || 0) + 1, cs: Math.max(prev.cs || 0, crisisScore) }));
            }}
            style={{ width: '100%', marginTop: '16px' }}
          >
            Back to Crisis Selection
          </button>
        </div>
      </div>
    );
  }

  const stage = crisis.stages[crisisStage];

  return (
    <div className="feed">
      <div className="block">
        <h3 className="block-title">{crisis.title}</h3>
        <div style={{
          display: 'flex',
          gap: '4px',
          marginBottom: '12px'
        }}>
          {crisis.stages.map((_, idx) => (
            <div
              key={idx}
              style={{
                flex: 1,
                height: '8px',
                background: idx < crisisStage ? '#66bb6a' : idx === crisisStage ? '#c2185b' : '#e8e8e8',
                borderRadius: '4px'
              }}
            />
          ))}
        </div>
        <p style={{ fontSize: '13px', color: '#5d4037' }}>Stage {crisisStage + 1} of {crisis.stages.length}</p>
      </div>

      <div className="block">
        <div className="crisis-timer">
          <div className="crisis-timer-fill" style={{ width: `${(crisisTimer / 20) * 100}%` }} />
        </div>
        <p style={{ textAlign: 'center', marginBottom: '12px', fontWeight: 600, color: crisisTimer <= 5 ? '#e53935' : '#3e2723' }}>
          ⏱️ Time remaining: {crisisTimer}s
        </p>
      </div>

      <div className="block">
        <h3 style={{ marginBottom: '12px' }}>{stage.title}</h3>
        <p style={{ marginBottom: '16px', color: '#5d4037' }}>{stage.description}</p>

        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {stage.options.map((option, idx) => (
            <button
              key={idx}
              className="decision-btn"
              onClick={() => {
                setCrisisRunning(false);
                handleCrisisChoice(idx);
              }}
              disabled={!crisisRunning}
              style={{ opacity: !crisisRunning ? 0.6 : 1, cursor: crisisRunning ? 'pointer' : 'default' }}
            >
              {option.text}
            </button>
          ))}
        </div>
      </div>

      {crisisChoices.length > 0 && (
        <div className="block">
          <h3 style={{ marginBottom: '12px' }}>Score: {crisisScore} points</h3>
        </div>
      )}
    </div>
  );
};

// Board Game
const Board = ({ stats, setStats }) => {
  const [boardPos, setBoardPos] = React.useState(0);
  const [diceVal, setDiceVal] = React.useState(null);
  const [boardScore, setBoardScore] = React.useState(0);
  const [boardEvent, setBoardEvent] = React.useState(null);
  const [rolling, setRolling] = React.useState(false);

  const rollDice = () => {
    setRolling(true);
    let val = Math.floor(Math.random() * 6) + 1;
    let cycles = 0;
    const interval = setInterval(() => {
      setDiceVal(Math.floor(Math.random() * 6) + 1);
      cycles++;
      if (cycles > 20) {
        clearInterval(interval);
        setDiceVal(val);
        setRolling(false);

        const newPos = boardPos + val;
        setBoardPos(Math.min(newPos, BOARD_TILES.length - 1));

        const tileEvent = BOARD_TILES[Math.min(newPos, BOARD_TILES.length - 1)];
        const eventScore = Math.floor(Math.random() * 20) + 10;
        setBoardEvent({ tile: tileEvent, score: eventScore });
        setBoardScore(prev => prev + eventScore);
      }
    }, 50);
  };

  const resetBoard = () => {
    setBoardPos(0);
    setDiceVal(null);
    setBoardScore(0);
    setBoardEvent(null);
    setStats(prev => ({ ...prev, bg: Math.max(prev.bg || 0, boardScore) }));
  };

  return (
    <div className="feed">
      <div className="block">
        <h3 className="block-title">🎲 Board Game Adventure</h3>
        <p style={{ marginBottom: '12px', color: '#5d4037' }}>Roll the dice and navigate through 24 tiles of HR challenges!</p>
      </div>

      <div className="board-container">
        <div style={{ marginBottom: '16px', textAlign: 'center' }}>
          <p style={{ marginBottom: '8px', fontWeight: 600 }}>Position: {boardPos + 1} / {BOARD_TILES.length}</p>
          <p style={{ fontSize: '20px', fontWeight: 700, color: '#c2185b' }}>Score: {boardScore} points</p>
        </div>

        <div className="board-grid">
          {BOARD_TILES.map((tile, idx) => (
            <div
              key={idx}
              className={`board-tile ${idx === boardPos ? 'current' : ''} ${idx < boardPos ? 'completed' : ''}`}
            >
              {idx + 1}
            </div>
          ))}
        </div>

        {diceVal !== null && (
          <div style={{
            textAlign: 'center',
            marginBottom: '16px',
            padding: '12px',
            background: '#f8e8ee',
            borderRadius: '8px'
          }}>
            <p style={{ fontSize: '12px', color: '#5d4037', marginBottom: '4px' }}>Dice Roll</p>
            <p style={{ fontSize: '32px', fontWeight: 700, color: '#c2185b' }}>🎲 {diceVal}</p>
          </div>
        )}

        {boardEvent && (
          <div style={{
            background: '#e8f5e9',
            border: '2px solid #66bb6a',
            borderRadius: '8px',
            padding: '12px',
            marginBottom: '16px'
          }}>
            <strong style={{ color: '#2e7d32' }}>🎯 {boardEvent.tile.type.toUpperCase()}</strong>
            <p style={{ fontSize: '13px', color: '#2e7d32', marginTop: '4px' }}>{boardEvent.tile.event}</p>
            <p style={{ marginTop: '8px', fontWeight: 600, color: '#2e7d32' }}>+ {boardEvent.score} points!</p>
          </div>
        )}

        <button
          className="dice-btn"
          onClick={rollDice}
          disabled={rolling || boardPos >= BOARD_TILES.length - 1}
          style={{ opacity: rolling || boardPos >= BOARD_TILES.length - 1 ? 0.6 : 1 }}
        >
          {rolling ? '🎲 Rolling...' : boardPos >= BOARD_TILES.length - 1 ? '✓ Game Complete!' : 'Roll Dice 🎲'}
        </button>

        {boardPos >= BOARD_TILES.length - 1 && (
          <button
            className="btn-secondary"
            onClick={resetBoard}
            style={{ width: '100%', marginTop: '12px' }}
          >
            Play Again
          </button>
        )}
      </div>
    </div>
  );
};

          }}>
            <span style={{ textTransform: 'capitalize' }}>{dim}</span>
            <span style={{ fontWeight: 600, color: '#c2185b' }}>+{points}</span>
          </div>
        ))}

        <button
          className="btn-primary"
          onClick={() => {
            setWarScores(prev => ({
              legal: prev.legal + choice.scores.legal,
              engagement: prev.engagement + choice.scores.engagement,
              business: prev.business + choice.scores.business,
              ethics: prev.ethics + choice.scores.ethics,
              strategy: prev.strategy + choice.scores.strategy
            }));
            setWarChoice(null);
            setWarPhase(warPhase + 1);
          }}
          style={{ width: '100%', marginTop: '16px' }}
        >
          {warPhase < currentCase.phases.length - 1 ? 'Next Phase' : 'Finish Case'}
        </button>
      </div>
    </div>
  );
};

// Achievements
const Achievements = ({ stats }) => {
  const achievements = [
    { id: 1, name: 'First Step 🌸', desc: 'Complete your first quiz', unlocked: stats.tq > 0 },
    { id: 2, name: 'Quiz Master 🌺', desc: 'Score 90%+ on 3 quizzes', unlocked: stats.qs >= 90 && stats.tq >= 3 },
    { id: 3, name: 'Scenario Solver 🌷', desc: 'Complete a scenario', unlocked: stats.ts > 0 },
    { id: 4, name: 'Crisis Manager 🔥', desc: 'Score 60+ in a crisis', unlocked: stats.cs >= 60 },
    { id: 5, name: 'Board Champion 🎲', desc: 'Score 100+ in board game', unlocked: stats.bg >= 100 },
    { id: 6, name: 'War Room Winner ⚖️', desc: 'Complete a war room case', unlocked: stats.tw > 0 },
    { id: 7, name: 'Expert Scholar 📚', desc: 'Study all 18 sections', unlocked: false },
    { id: 8, name: 'Rapid Learner ⚡', desc: 'Complete 5 quizzes', unlocked: stats.tq >= 5 },
    { id: 9, name: 'Strategic Thinker 🧠', desc: 'Score 80%+ average on quizzes', unlocked: stats.qs >= 80 },
    { id: 10, name: 'Scenario Champion 🎬', desc: 'Play 5 scenarios', unlocked: stats.ts >= 5 },
    { id: 11, name: 'Master of All 💎', desc: 'Score 75%+ on quiz + 60+ crisis + complete warroom', unlocked: stats.qs >= 75 && stats.cs >= 60 && stats.tw > 0 },
    { id: 12, name: 'Legend 👑', desc: 'Unlock 10 other achievements', unlocked: false }
  ];

  const unlockedCount = achievements.filter(a => a.unlocked).length;

  return (
    <div className="feed">
      <div className="block">
        <h3 className="block-title">Your Achievements 🏆</h3>
        <p style={{ marginBottom: '12px', color: '#5d4037', fontSize: '13px' }}>
          Unlocked: <strong>{unlockedCount} of {achievements.length}</strong>
        </p>
      </div>

      <div className="achievement-grid">
        {achievements.map(ach => (
          <div
            key={ach.id}
            className={`achievement-card ${!ach.unlocked ? 'locked' : ''}`}
          >
            <div className="achievement-card-icon">
              {ach.unlocked ? ach.name.split(' ')[ach.name.split(' ').length - 1] : '🔒'}
            </div>
            <div className="achievement-card-name">{ach.name}</div>
            <p style={{ fontSize: '11px', color: 'inherit', marginTop: '4px', opacity: 0.8 }}>
              {ach.desc}
            </p>
          </div>
        ))}
      </div>
    </div>
  );
};

// Main App
const App = () => {
  const [view, setView] = React.useState("home");
  const [currentModule, setCurrentModule] = React.useState(null);

  // Quiz state
  const [questions, setQuestions] = React.useState([]);
  const [qIndex, setQIndex] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [answered, setAnswered] = React.useState(false);
  const [results, setResults] = React.useState([]);

  // Scenario state
  const [scenIndex, setScenIndex] = React.useState(0);
  const [chosenDecision, setChosenDecision] = React.useState(null);

  // Study state
  const [openSections, setOpenSections] = React.useState({});

  // Global stats
  const [stats, setStats] = React.useState({
    tq: 0, ts: 0, tc: 0, tw: 0,
    qs: 0, ps: 0, bs: 0, cs: 0, bg: 0
  });

  return (
    <div className="app">
      <Header />
      <Nav view={view} setView={setView} />

      {view === 'home' && <Home stats={stats} />}
      {view === 'study' && (
        <Study
          currentModule={currentModule}
          setCurrentModule={setCurrentModule}
          openSections={openSections}
          setOpenSections={setOpenSections}
        />
      )}
      {view === 'quiz' && (
        <Quiz
          currentModule={currentModule}
          setCurrentModule={setCurrentModule}
          qIndex={qIndex}
          setQIndex={setQIndex}
          selected={selected}
          setSelected={setSelected}
          answered={answered}
          setAnswered={setAnswered}
          results={results}
          setResults={setResults}
          questions={questions}
          setQuestions={setQuestions}
          stats={stats}
          setStats={setStats}
        />
      )}
      {view === 'scenario' && (
        <Scenario
          currentModule={currentModule}
          setCurrentModule={setCurrentModule}
          scenIndex={scenIndex}
          setScenIndex={setScenIndex}
          chosenDecision={chosenDecision}
          setChosenDecision={setChosenDecision}
          stats={stats}
          setStats={setStats}
        />
      )}
      {view === 'crisis' && <Crisis stats={stats} setStats={setStats} />}
      {view === 'board' && <Board stats={stats} setStats={setStats} />}
      {view === 'warroom' && <WarRoom stats={stats} setStats={setStats} />}
      {view === 'achievements' && <Achievements stats={stats} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
